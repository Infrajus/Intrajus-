<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>INFRAJUS | Inteligência Pericial</title>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #050d1a;
      color: #d8c7a3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden; /* Mantém a organização sem barras de rolagem */
      position: relative;
    }

    /* CAMADA FORENSE: Efeito de Inteligência Ativa */
    .forensic-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .trace {
      position: absolute;
      color: #cbb38a;
      opacity: 0;
      font-family: monospace;
      animation: scan-effect 12s infinite ease-in-out;
    }

    @keyframes scan-effect {
      0%, 100% { opacity: 0; }
      50% { opacity: 0.04; } /* Opacidade sutil de 4% */
    }

    .trace:nth-child(1) { top: 20%; left: 10%; font-size: 100px; animation-delay: 0s; }
    .trace:nth-child(2) { top: 60%; right: 15%; font-size: 80px; animation-delay: 4s; }
    .trace:nth-child(3) { bottom: 15%; left: 25%; font-size: 120px; animation-delay: 8s; }

    /* ESTRUTURA PRINCIPAL */
    .main-wrapper {
      max-width: 500px;
      padding: 20px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .logo-container {
      margin-bottom: 30px;
    }

    .logo-container img {
      width: 160px;
      height: 160px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
    }

    h1 {
      color: #cbb38a;
      letter-spacing: 2px;
      font-size: 22px;
      margin-bottom: 20px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 20px;
      color: #d8c7a3;
    }

    button {
      padding: 12px 30px;
      border: 1px solid #cbb38a;
      background: transparent;
      color: #cbb38a;
      cursor: pointer;
      border-radius: 6px;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background: #cbb38a;
      color: #050d1a;
    }
  </style>
</head>

<body>

  <div class="forensic-layer">
    <div class="trace">◌</div>
    <div class="trace">◎</div>
    <div class="trace">◉</div>
  </div>

  <div class="main-wrapper">
    
    <div class="logo-container">
        <img src="1000527572-removebg-preview.png" alt="Logo INFRAJUS">
    </div>

    <h1>INFRAJUS INTELIGÊNCIA PERICIAL</h1>

    <p>Inteligência pericial aplicada à análise de fatos, evidências e contextos digitais.</p>
    <p>Um ambiente de triagem e compreensão técnica de situações complexas.</p>

    <button>INICIAR EXPERIÊNCIA</button>

  </div>

</body>
</html>
