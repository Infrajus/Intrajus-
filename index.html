                  <!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>INFRAJUS | Inteligência Pericial</title>
  
  <style>
    body {
      margin: 0; padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #050d1a;
      color: #d8c7a3;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; text-align: center;
      overflow: hidden; position: relative;
    }

    /* Navegação */
    nav {
      position: relative; z-index: 2;
      padding: 20px; width: 100%;
      display: flex; justify-content: center; gap: 20px;
    }
    .nav-btn {
      color: #cbb38a; text-decoration: none; 
      text-transform: uppercase; font-size: 11px; 
      letter-spacing: 1px; border: 1px solid #cbb38a;
      padding: 6px 12px; border-radius: 4px;
      transition: 0.3s;
    }
    .nav-btn:hover { background: #cbb38a; color: #050d1a; }

    /* Fundo forense */
    .forensic-layer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .fingerprint-img {
      position: absolute; width: 120px;
      opacity: 0.06;
    }
    .fp1 { top: 5%; left: 5%; }
    .fp2 { bottom: 5%; right: 5%; }

    .main-wrapper {
      max-width: 500px; padding: 20px;
      width: 100%; position: relative; z-index: 1;
      margin-top: 50px;
    }

    .logo-container { margin-bottom: 30px; }
    .logo-container img {
      width: 140px; height: 140px;
      object-fit: contain; display: block; margin: 0 auto;
    }

    h1 { color: #cbb38a; letter-spacing: 2px; font-size: 22px; margin-bottom: 20px; }
    p { font-size: 15px; line-height: 1.6; margin-bottom: 20px; color: #d8c7a3; opacity: 0.9; }

    button {
      padding: 12px 30px;
      border: 1px solid #cbb38a;
      background: transparent;
      color: #cbb38a;
      cursor: pointer;
      border-radius: 6px;
      font-size: 16px;
      transition: 0.3s;
      text-transform: uppercase;
    }
    button:hover { background: #cbb38a; color: #050d1a; }
  </style>
</head>

<body>

  <nav>
    <a href="pericias.html" class="nav-btn">Perícias</a>
    <a href="investigacoes.html" class="nav-btn">Investigações</a>
    <a href="faq.html" class="nav-btn">Dúvidas</a>
    <a href="casos.html" class="nav-btn">Casos</a>
  </nav>

  <div class="forensic-layer">
    <img src="1000533655-removebg-preview.png" class="fingerprint-img fp1" alt="Digital 1">
    <img src="1000533656-removebg-preview.png" class="fingerprint-img fp2" alt="Digital 2">
  </div>

  <div class="main-wrapper">
    <div class="logo-container">
        <img src="1000527572-removebg-preview.png" alt="Logo INFRAJUS">
    </div>

    <h1>INFRAJUS INTELIGÊNCIA PERICIAL</h1>
    <p>Inteligência pericial aplicada à análise de fatos, evidências e contextos digitais.</p>
    <p>Um ambiente de triagem e compreensão técnica de situações complexas.</p>

    <button onclick="window.location.href='triagem.html'">ACESSAR TRIAGEM INTELIGENTE</button>
  </div>

</body>
</html>
