<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Protocolo Gerado | INFRAJUS</title>
  <style>
    body {
      margin: 0; padding: 0;
      background-color: #050d1a;
      color: #d8c7a3;
      font-family: 'Courier New', Courier, monospace;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh;
    }

    .protocol-box {
      width: 90%; max-width: 500px;
      border: 1px solid #cbb38a;
      padding: 30px;
      text-align: center;
      background: rgba(203, 179, 138, 0.05);
    }

    h2 { color: #cbb38a; text-transform: uppercase; letter-spacing: 3px; }
    
    .code { 
      font-size: 24px; font-weight: bold; 
      margin: 20px 0; color: #fff;
      border-bottom: 1px dashed #cbb38a;
      padding-bottom: 10px;
    }

    p { line-height: 1.6; font-size: 14px; }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      background: transparent;
      color: #cbb38a;
      border: 1px solid #cbb38a;
      cursor: pointer;
      text-transform: uppercase;
    }
    button:hover { background: #cbb38a; color: #050d1a; }
  </style>
</head>
<body>

  <div class="protocol-box">
    <h2>Protocolo de Triagem</h2>
    <div class="code" id="numProtocolo">CARREGANDO...</div>
    <p>Solicitação recebida com sucesso no sistema INFRAJUS.</p>
    <p>Nossa equipe técnica iniciou a análise preliminar dos dados fornecidos.</p>
    <p><strong>Prazo estimado: 24 horas.</strong></p>
    
    <button onclick="window.location.href='index.html'">RETORNAR AO INÍCIO</button>
  </div>

  <script>
    // Esta função gera um número aleatório e coloca na tela assim que a página abre
    function gerarProtocolo() {
      const parteAleatoria = Math.floor(Math.random() * (999999 - 100000 + 1)) + 100000;
      const protocoloFinal = "INF-" + parteAleatoria + "-X";
      document.getElementById('numProtocolo').innerText = protocoloFinal;
    }

    // Executa a função ao carregar a página
    window.onload = gerarProtocolo;
  </script>

</body>
</html>
