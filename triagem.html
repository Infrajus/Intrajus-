<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Triagem INFRAJUS</title>
  <style>
    body {
      background-color: #050d1a;
      color: #cbb38a;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 400px;
      border: 1px solid #cbb38a;
      padding: 20px;
      border-radius: 8px;
    }
    input, textarea {
      width: 100%;
      margin-bottom: 15px;
      background: #0a1628;
      border: 1px solid #cbb38a;
      color: white;
      padding: 10px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #cbb38a;
      color: #050d1a;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>TRIAGEM PERICIAL</h2>
    <form>
      <label>Nome:</label>
      <input type="text">
      
      <label>WhatsApp:</label>
      <input type="tel">
      
      <label>E-mail:</label>
      <input type="email">
      
      <label>Relato:</label>
      <textarea rows="4"></textarea>
      
      <button type="button">ENVIAR TRIAGEM</button>
    </form>
  </div>

</body>
</html>
